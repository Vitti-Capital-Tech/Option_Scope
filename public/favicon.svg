<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Candlestick 1 (green - call) -->
  <rect x="5" y="14" width="4" height="8" rx="1" fill="#3fb950"/>
  <line x1="7" y1="10" x2="7" y2="14" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="7" y1="22" x2="7" y2="26" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Candlestick 2 (red - put) -->
  <rect x="13" y="10" width="4" height="10" rx="1" fill="#f85149"/>
  <line x1="15" y1="6" x2="15" y2="10" stroke="#f85149" stroke-width="1.5"/>
  <line x1="15" y1="20" x2="15" y2="25" stroke="#f85149" stroke-width="1.5"/>

  <!-- Candlestick 3 (gold - combined) -->
  <rect x="21" y="12" width="4" height="9" rx="1" fill="#e3b341"/>
  <line x1="23" y1="8" x2="23" y2="12" stroke="#e3b341" stroke-width="1.5"/>
  <line x1="23" y1="21" x2="23" y2="26" stroke="#e3b341" stroke-width="1.5"/>

  <!-- Accent bar at bottom -->
  <rect x="5" y="29" width="22" height="1.5" rx="0.75" fill="#00d9a3" opacity="0.8"/>
</svg>